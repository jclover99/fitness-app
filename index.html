// 根據選擇的部位取出對應熱身和收操動作（去重）
function getWarmup(parts){
  const seen = new Set();
  return parts.flatMap(p => (WARMUP_DB[p]||[])).filter(w => {
    if(seen.has(w.name)) return false;
    seen.add(w.name); return true;
  }).slice(0, 4); // 最多4個熱身動作
}
function getCooldown(parts){
  const seen = new Set();
  return parts.flatMap(p => (COOLDOWN_DB[p]||[])).filter(c => {
    if(seen.has(c.name)) return false;
    seen.add(c.name); return true;
  }).slice(0, 5); // 最多5個收操動作
}

];

// 根據器材名稱推斷區域
function getZone(equipment){
  if(!equipment) return null;
  for(const rule of ZONE_RULES){
    if(rule.keywords.some(kw => equipment.includes(kw))) return rule;
  }
  return {zone:"自由重量區", icon:"🏋️", color:"#9ca3af"};
}

// 根據器材名稱找到最接近的 SVG 圖示
function getEquipSVG(equipName, color="currentColor"){
  if(!equipName) return null;
  // 完整比對
  if(EQUIP_SVG[equipName]) return EQUIP_SVG[equipName](color);
  // 關鍵字比對
  const keys = Object.keys(EQUIP_SVG);
  const match = keys.find(k => equipName.includes(k) || k.includes(equipName));
  if(match) return EQUIP_SVG[match](color);
  return null;
}

// 器材圖示元件
function EquipIcon({name, color="#9ca3af", size=44}){
  const svg = getEquipSVG(name, color);
  if(!svg) return null;
  return (
    <div style={{width:size, height:size, display:"flex", alignItems:"center", justifyContent:"center",
      opacity:0.9, flexShrink:0}}>
      {svg}
    </div>
  );
}

// 拆解器材字串成選項陣列，支援 / ＋ + 分隔
function getEquipVariants(equipment){
  if(!equipment) return [];
  const parts = equipment.split(/[\/＋+]/).map(s=>s.trim()).filter(Boolean);
  return parts.length > 1 ? parts : [];
}

function ZoneTag({equipment, style={}}){
  const z = getZone(equipment);
  if(!z) return null;
  return (
    <span style={{fontSize:10,padding:"2px 7px",borderRadius:99,background:z.color+"22",
      color:z.color,fontWeight:600,border:`1px solid ${z.color}44`,...style}}>
      {z.icon} {z.zone}
    </span>
  );
}

/* ─── AI 教練問答邏輯 ─── */
function generateCoachReply(question, bodyTag, selParts, db) {
  const q = question.toLowerCase();
  const allExs = Object.values(db).flat();

  // 排課請求
  if (q.includes("排課") || q.includes("幫我安排") || q.includes("今天練什麼") || q.includes("課表")) {
    const tagInfo = BODY_TAGS.find(t=>t.id===bodyTag);
    let reply = `好的！根據你現在「${tagInfo.label}」的身體狀況`;
    if (selParts.length > 0) reply += `，你想練 ${selParts.join("、")}`;
    reply += `，這是我為你安排的今日課表：\n\n`;

    let recommendedParts = selParts.length > 0 ? selParts : ["腿", "核心"];
    if (bodyTag === "tired") recommendedParts = ["伸展", "有氧"];
    if (bodyTag === "period") recommendedParts = ["腿", "伸展"];
    if (bodyTag === "sore_back") recommendedParts = recommendedParts.filter(p => p !== "腿");
    if (bodyTag === "sore_knee") recommendedParts = recommendedParts.filter(p => p !== "腿");
    if (recommendedParts.length === 0) recommendedParts = ["伸展"];

    let count = 1;
    recommendedParts.forEach(part => {
      const exs = db[part] || [];
      const pick = exs.slice(0, 2);
      pick.forEach(ex => {
        reply += `${count}. **${ex.name}**（${part}） — ${ex.sets} × ${ex.reps}\n`;
        count++;
      });
    });
    reply += `\n共 ${count-1} 個動作，預計 45-60 分鐘。記得熱身5分鐘、收操伸展10分鐘喔！💪`;
    return reply;
  }

  // 身體不適問題
  if (q.includes("酸") || q.includes("痛") || q.includes("不舒服") || q.includes("受傷")) {
    if (q.includes("腰") || q.includes("下背")) return "下背酸的時候，**臀橋**反而是最好的緩解動作！它能強化臀肌，減輕腰部負擔。今天避免深蹲和硬舉，可以做：\n\n1. 臀橋 3組 × 15下（輕鬆版，不加重量）\n2. 貓牛式 2組 × 10次呼吸\n3. 上半身訓練照常\n\nStacy Sims：核心力量不足是下背痛最常見的原因，長期做棒式可以改善。";

    if (q.includes("肩") || q.includes("肩膀")) return "肩膀不適要格外小心！今天避免過頭推舉，可以做：\n\n1. 滑輪下拉（背部）\n2. 划船類動作（背部）\n3. 腿部訓練照常\n\nHuberman：肩膀問題90%來自胸椎活動度不足，每天做胸椎旋轉可以預防。";

    <div style={{background:"linear-gradient(135deg,#831843,#7f1d1d,#111827)",padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
      <span style={{fontSize:24}}>🌸</span>
      <div>
        <div style={{fontWeight:700,fontSize:17}}>Sandra 的健身教練 v7</div>
        <div style={{fontSize:10,color:"#f9a8d4"}}>智慧排課 · 問教練 · 可擴充動作庫</div>
      </div>
      <div style={{marginLeft:"auto",textAlign:"right"}}>
        <div style={{fontSize:10,color:"#9ca3af"}}>本月訓練</div>
        <div style={{fontSize:16,fontWeight:700,color:"#f472b6"}}>{logs.length}次 🔥</div>
      </div>
    </div>

    {/* Tabs */}
    <div style={{display:"flex",background:"#0f172a",borderBottom:"1px solid #1e293b"}}>
      {TABS.map(t=>(
        <button key={t.id} onClick={()=>{setTab(t.id);setSelEx(null);setShowAddEx(false);}}
          style={{flex:1,padding:"10px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:1,fontSize:10,
            color:tab===t.id?"#f472b6":"#6b7280",borderBottom:tab===t.id?"2px solid #f472b6":"2px solid transparent",background:"none",cursor:"pointer"}}>
          <span style={{fontSize:17}}>{t.icon}</span>{t.label}
        </button>
      ))}
    </div>

    <div style={{padding:"12px 16px",paddingBottom:80}}>

    {/* ════ 今天練什麼 ════ */}
    {tab==="today" && !selEx &&(
    <div className="slide-in" style={{display:"flex",flexDirection:"column",gap:12}}>

      {/* 身體狀況 */}
      <div style={{background:"#111827",borderRadius:16,padding:14,border:"1px solid #1e293b"}}>
        <div style={{fontWeight:700,fontSize:12,color:"#9ca3af",marginBottom:10}}>① 今天身體狀況</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
          {BODY_TAGS.map(tag=>(
            <button key={tag.id} onClick={()=>setBodyTag(tag.id)}
              style={{...bg(bodyTag===tag.id,tag.color),borderRadius:10,padding:"7px 3px",fontSize:10,fontWeight:500,textAlign:"center",cursor:"pointer"}}>
              <div style={{fontSize:16}}>{tag.icon}</div>{tag.label}
            </button>
          ))}
        </div>
        {tagData?.advice&&(
          <div style={{marginTop:10,padding:10,borderRadius:10,fontSize:11,color:"#d1d5db",lineHeight:1.7,background:tagData.color+"15",border:`1px solid ${tagData.color}33`}}>
            <span style={{fontWeight:700,color:tagData.color}}>教練建議：</span> {tagData.advice}
          </div>
        )}
      </div>

      {/* Cowork 匯入課表 */}
      {!showImport && (
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={()=>setShowImport(true)}
            style={{flex:1,padding:"10px 14px",background:"#0f172a",border:"1px dashed #6366f1",borderRadius:12,
              color:"#a5b4fc",fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
            📋 貼上 Cowork 課表
            <span style={{fontSize:10,color:"#6b7280",fontWeight:400}}>自動帶入今日動作</span>
          </button>
          {importedPlan && (
            <button onClick={()=>{setImportedPlan(null);setSelParts([]);}}
              style={{padding:"10px 12px",background:"#1f2937",border:"1px solid #374151",borderRadius:12,
                color:"#f472b6",fontSize:11,cursor:"pointer"}}>
              ✕ 清除匯入
            </button>
          )}
        </div>
      )}

      {/* 匯入面板 */}
      {showImport && (
        <div style={{background:"#0f172a",borderRadius:14,padding:14,border:"1px solid #6366f1"}}>
          <div style={{fontWeight:700,fontSize:13,color:"#a5b4fc",marginBottom:8}}>📋 貼上 Cowork 課表文字</div>
          <div style={{fontSize:11,color:"#6b7280",marginBottom:10,lineHeight:1.6}}>
            把 Cowork 幫你安排的課表文字直接貼進來，App 會自動找出裡面的動作
          </div>
          <textarea value={importText} onChange={e=>setImportText(e.target.value)}
            placeholder={"貼上課表文字，例如：\n1. 槓鈴臥推 3組×6下\n2. 滑輪夾胸 3組×12下\n3. 棒式 3組×45秒…"}
            style={{width:"100%",background:"#1e293b",border:"1px solid #334155",borderRadius:10,
              padding:"10px 12px",fontSize:12,color:"white",resize:"none",height:120,lineHeight:1.6,marginBottom:10}}/>
          <div style={{display:"flex",gap:8}}>
            <button onClick={applyImport}
              style={{flex:1,padding:"10px",background:"#4f46e5",border:"none",borderRadius:10,
                color:"white",fontSize:13,fontWeight:700,cursor:"pointer"}}>
              ✅ 套用課表
            </button>
            <button onClick={()=>{setShowImport(false);setImportText("");}}
              style={{padding:"10px 14px",background:"#1f2937",border:"1px solid #374151",borderRadius:10,
                color:"#9ca3af",fontSize:13,cursor:"pointer"}}>
              取消
            </button>
          </div>
        </div>
      )}

      {/* 匯入成功提示 */}
      {importedPlan && (
        <div style={{background:"#0a2718",borderRadius:12,padding:"10px 14px",border:"1px solid #166534",
          display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:20}}>✅</span>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:"#4ade80"}}>已套用 Cowork 課表</div>
            <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>
              找到 {importedPlan.exNames.length} 個動作：{importedPlan.exNames.join("、")}
            </div>
          </div>
        </div>
      )}

      {/* 選部位 */}
      <div style={{background:"#111827",borderRadius:16,padding:14,border:"1px solid #1e293b"}}>
        <div style={{fontWeight:700,fontSize:12,color:"#9ca3af",marginBottom:4}}>② 今天想練哪裡？</div>
        <div style={{fontSize:10,color:"#4b5563",marginBottom:10}}>可多選，自由組合</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6}}>
          {allParts.map(p=>(
            <button key={p} onClick={()=>togglePart(p)}
              style={{...bg(selParts.includes(p),PC[p]),borderRadius:10,padding:"10px 4px",fontSize:12,fontWeight:700,display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer"}}>
              <span style={{fontSize:18}}>{PI[p]}</span>{p}
            </button>
          ))}
        </div>
      </div>

      {/* 智慧排課建議 */}
      {(bodyTag!=="normal"||selParts.length>0)&&(
        <div style={{background:"#0f172a",borderRadius:14,padding:12,border:"1px solid #334155",display:"flex",gap:10,alignItems:"flex-start"}}>
          <span style={{fontSize:22,flexShrink:0}}>🤖</span>
          <div style={{fontSize:12,color:"#d1d5db",lineHeight:1.7}}>
            {bodyTag==="tired" && <><span style={{color:"#94a3b8",fontWeight:700}}>你說今天很累</span>，教練建議今天只做 <span style={{color:"#4ade80"}}>伸展＋輕有氧</span>，保護身體也算訓練！</>}
            {bodyTag==="period" && <><span style={{color:"#f472b6",fontWeight:700}}>生理期中</span>，Stacy Sims 說第1-2天好好休息，今天做 <span style={{color:"#f472b6"}}>臀橋＋伸展</span> 最棒！</>}
            {bodyTag==="sore_back" && <><span style={{color:"#fbbf24",fontWeight:700}}>下背酸</span>，今天避免深蹲硬舉，改練 <span style={{color:"#fbbf24"}}>臀橋＋上半身</span>，反而能緩解！</>}
            {bodyTag==="sore_knee" && <><span style={{color:"#f97316",fontWeight:700}}>膝蓋不適</span>，今天推薦 <span style={{color:"#f97316"}}>橢圓機＋上半身</span>，低衝擊無負擔！</>}
            {bodyTag==="injured" && <><span style={{color:"#ef4444",fontWeight:700}}>受傷中</span>，請先充分休息。告訴教練是哪裡受傷，我來幫你找替代方案！</>}
            {bodyTag==="normal" && selParts.length>0 && <>很好！選了 <span style={{color:"#4ade80",fontWeight:700}}>{selParts.join("＋")}</span>，下面是教練為你挑選的動作組合 💪</>}
          </div>
        </div>
      )}

      {/* 今日課表 + 內嵌記錄 */}
      {todayExs.length>0&&(<>

        {/* ── 熱身區塊 ── */}
        {(()=>{
          const warmups = getWarmup(selParts);
          if(warmups.length===0) return null;
          return (
            <div style={{background:"#111827",borderRadius:14,border:"1px solid #f97316aa",overflow:"hidden"}}>
              <button onClick={()=>setShowWarmup(v=>!v)}
                style={{width:"100%",padding:"10px 14px",background:"transparent",border:"none",cursor:"pointer",
                  display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:18}}>🔥</span>
                  <span style={{fontWeight:700,fontSize:13,color:"#fb923c"}}>熱身 {warmups.length} 個動作</span>
                  <span style={{fontSize:10,color:"#6b7280"}}>約 5 分鐘，先做這個！</span>
                </div>
                <span style={{color:"#f97316",fontSize:14}}>{showWarmup?"▲":"▼"}</span>
              </button>
              {showWarmup&&(
                <div style={{padding:"0 14px 12px",display:"flex",flexDirection:"column",gap:6}}>
                  {warmups.map((w,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",
                      background:"#0f172a",borderRadius:10,border:"1px solid #1e293b"}}>
                      <span style={{fontSize:18,flexShrink:0}}>
                        {["🏃","🦵","🙆","🤸"][i%4]}
                      </span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:12,fontWeight:600,color:"#f9fafb"}}>{w.name}</div>
                        <div style={{fontSize:10,color:"#fb923c",marginTop:1}}>⏱ {w.duration}</div>
                        <div style={{fontSize:10,color:"#6b7280",marginTop:1}}>💡 {w.tip}</div>
                      </div>
                      {w.yt&&(
                        <a href={`https://www.youtube.com/watch?v=${w.yt}`} target="_blank"
                          onClick={e=>e.stopPropagation()}
                          style={{fontSize:10,padding:"3px 8px",borderRadius:99,background:"#ef444433",
                            color:"#f87171",textDecoration:"none",flexShrink:0}}>▶ 影片</a>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })()}

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontWeight:700,color:"#f472b6",fontSize:14}}>💪 主訓練：{selParts.join("＋")}</div>
          <div style={{fontSize:11,color:"#6b7280"}}>{todayExs.length}個動作</div>
        </div>

        {todayExs.map(ex=>{
          const last=lastRecord(ex.name);
          const setIdx = logForm.sets.findIndex(s=>s.ex===ex.name);
          const thisSet = setIdx>=0 ? logForm.sets[setIdx] : null;
          const variants = getEquipVariants(ex.equipment);
          const chosenEquip = selEquip[ex.id] || (variants.length>0 ? variants[0] : ex.equipment);
          const updateSet=(field,val)=>{
            setLogForm(f=>{
              const sets=[...f.sets];
              const idx=sets.findIndex(s=>s.ex===ex.name);
              if(idx>=0) sets[idx]={...sets[idx],[field]:val,equip:chosenEquip};
              else {
                const base={ex:ex.name,kg:"",reps:"",sets:"",equip:chosenEquip};
                base[field]=val;
                sets.push(base);
              }
              return {...f,sets};
            });
          };
          return(
          <div key={ex.id} style={{background:"#111827",borderRadius:14,border:`1px solid ${thisSet&&thisSet.kg?"#166534":"#1e293b"}`,marginBottom:6,overflow:"hidden"}}>
            {/* 上半：動作資訊，點進詳情 */}
            <div onClick={()=>setSelEx(ex)} style={{padding:"10px 12px",display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
              <MuscleBody highlight={ex.muscles} size={44}/>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2,flexWrap:"wrap"}}>
                  <span style={{fontWeight:700,fontSize:14}}>{ex.name}</span>
                  {ex.isCustom && <span style={{fontSize:9,padding:"1px 5px",borderRadius:99,background:"#f59e0b33",color:"#f59e0b"}}>自訂</span>}
                  <span style={{fontSize:9,padding:"1px 6px",borderRadius:99,background:PC[ex.muscles[0]]+"33",color:PC[ex.muscles[0]]}}>{ex.muscles[0]}</span>
                  <ZoneTag equipment={chosenEquip}/>
                </div>
                <div style={{fontSize:11,color:PC[ex.muscles[0]]}}>{ex.sets} × {ex.reps}</div>
                {last&&<div style={{fontSize:10,color:"#4ade80",marginTop:1}}>上次：{last.kg}kg × {last.reps}下 × {last.sets}組{last.equip?` ‧ ${last.equip}`:""}</div>}
              </div>
              <span style={{color:"#4b5563",fontSize:14}}>›</span>
            </div>
            {/* 下半：器材切換 + 直接填寫記錄 */}
            <div style={{padding:"8px 12px 10px",borderTop:"1px solid #1e293b",background:"#0f172a"}}>
              {/* 器材切換按鈕（SVG 圖示卡片） */}
              {variants.length>0&&(
                <div style={{marginBottom:8}}>
                  <div style={{fontSize:9,color:"#6b7280",marginBottom:6}}>🔧 今天用哪個器材？</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {variants.map(v=>{
                      const z=getZone(v);
                      const isActive=chosenEquip===v;
                      const activeColor = z ? z.color : "#818cf8";
                      return(
                        <button key={v} onClick={e=>{e.stopPropagation();setSelEquip(s=>({...s,[ex.id]:v}));}}
                          style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,
                            padding:"8px 10px",borderRadius:12,cursor:"pointer",
                            background:isActive ? activeColor+"22" : "#1a2235",
                            border:`1.5px solid ${isActive ? activeColor+"88" : "#2d3748"}`,
                            minWidth:60, transition:"all 0.15s"}}>
                          <EquipIcon name={v} color={isActive ? activeColor : "#4b5563"} size={38}/>
                          <span style={{fontSize:9,fontWeight:isActive?700:400,
                            color:isActive ? activeColor : "#6b7280",lineHeight:1.2,textAlign:"center"}}>
                            {v}
                          </span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              )}
              <div style={{fontSize:10,color:"#6b7280",marginBottom:6}}>📝 今天的成績</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr auto",gap:6,alignItems:"center"}}>
                <div>
                  <div style={{fontSize:9,color:"#6b7280",marginBottom:3}}>重量 (kg)</div>
                  <input type="number" placeholder={last?String(last.kg):"0"}
                    value={thisSet?thisSet.kg:""}
                    onChange={e=>updateSet("kg",e.target.value)}
                    style={{width:"100%",background:"#1e293b",border:"1px solid #334155",borderRadius:8,padding:"7px 8px",fontSize:13,color:"white",textAlign:"center"}}/>
                </div>
                <div>
                  <div style={{fontSize:9,color:"#6b7280",marginBottom:3}}>下數</div>
                  <input type="number" placeholder={last?String(last.reps):""}
                    value={thisSet?thisSet.reps:""}
                    onChange={e=>updateSet("reps",e.target.value)}
                    style={{width:"100%",background:"#1e293b",border:"1px solid #334155",borderRadius:8,padding:"7px 8px",fontSize:13,color:"white",textAlign:"center"}}/>
                </div>
                <div>
                  <div style={{fontSize:9,color:"#6b7280",marginBottom:3}}>組數</div>
                  <input type="number" placeholder={last?String(last.sets):""}
                    value={thisSet?thisSet.sets:""}
                    onChange={e=>updateSet("sets",e.target.value)}
                    style={{width:"100%",background:"#1e293b",border:"1px solid #334155",borderRadius:8,padding:"7px 8px",fontSize:13,color:"white",textAlign:"center"}}/>
                </div>
                <div style={{paddingTop:16}}>
                  {thisSet&&thisSet.kg&&<span style={{fontSize:16}}>✅</span>}
                </div>
              </div>
            </div>
          </div>
        );})}

        {/* ── 收操拉筋區塊 ── */}
        {(()=>{
          const cooldowns = getCooldown(selParts);
          if(cooldowns.length===0) return null;
          return (
            <div style={{background:"#111827",borderRadius:14,border:"1px solid #34d399aa",overflow:"hidden"}}>
              <button onClick={()=>setShowCooldown(v=>!v)}
                style={{width:"100%",padding:"10px 14px",background:"transparent",border:"none",cursor:"pointer",
                  display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:18}}>🧘</span>
                  <span style={{fontWeight:700,fontSize:13,color:"#34d399"}}>收操拉筋 {cooldowns.length} 個動作</span>
                  <span style={{fontSize:10,color:"#6b7280"}}>訓練完必做！</span>
                </div>
                <span style={{color:"#34d399",fontSize:14}}>{showCooldown?"▲":"▼"}</span>
              </button>
              {showCooldown&&(
                <div style={{padding:"0 14px 12px",display:"flex",flexDirection:"column",gap:6}}>
                  {cooldowns.map((c,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",
                      background:"#0f172a",borderRadius:10,border:"1px solid #1e293b"}}>
                      <span style={{fontSize:18,flexShrink:0}}>
                        {["🧘","🙆","🤸","💆","🛌"][i%5]}
                      </span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:12,fontWeight:600,color:"#f9fafb"}}>{c.name}</div>
                        <div style={{fontSize:10,color:"#34d399",marginTop:1}}>⏱ {c.duration}</div>
                        <div style={{fontSize:10,color:"#6b7280",marginTop:1}}>💡 {c.tip}</div>
                      </div>
                      {c.yt&&(
                        <a href={`https://www.youtube.com/watch?v=${c.yt}`} target="_blank"
                          onClick={e=>e.stopPropagation()}
                          style={{fontSize:10,padding:"3px 8px",borderRadius:99,background:"#10b98133",
                            color:"#34d399",textDecoration:"none",flexShrink:0}}>▶ 影片</a>
                      )}
                    </div>
                  ))}
                  <div style={{fontSize:10,color:"#4b5563",textAlign:"center",marginTop:4}}>
                    Stacy Sims：收操拉筋讓肌肉放鬆、減少延遲性痠痛，40+ 女性恢復速度更重要 💛
                  </div>
                </div>
              )}
            </div>
          );
        })()}

        {/* 腰圍 + 備註 */}
        <div style={{background:"#111827",borderRadius:14,padding:12,border:"1px solid #1e293b"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
            <div>
              <div style={{fontSize:10,color:"#9ca3af",marginBottom:4}}>腰圍 cm（可略）</div>
              <input value={logForm.waist} onChange={e=>setLogForm(f=>({...f,waist:e.target.value}))}
                placeholder="例：76.5" type="number"
                style={{width:"100%",background:"#1e293b",border:"1px solid #334155",borderRadius:8,padding:"8px 10px",fontSize:13,color:"white"}}/>
            </div>
            <div>
              <div style={{fontSize:10,color:"#9ca3af",marginBottom:4}}>今天身體狀況</div>
              <div style={{fontSize:11,padding:"8px 10px",background:"#1e293b",borderRadius:8,color:tagData.color}}>
                {tagData.icon} {tagData.label}
              </div>
            </div>
          </div>
          <div style={{fontSize:10,color:"#9ca3af",marginBottom:4}}>備註（可略）</div>
          <textarea value={logForm.note} onChange={e=>setLogForm(f=>({...f,note:e.target.value}))}
            placeholder="例：深蹲今天膝蓋有點緊…"
            style={{width:"100%",background:"#1e293b",border:"1px solid #334155",borderRadius:8,padding:"8px 10px",fontSize:12,color:"white",resize:"none",height:56}}/>
        </div>

        <button onClick={()=>setTab("coach")}
          style={{width:"100%",padding:12,background:"#1e293b",borderRadius:14,fontWeight:600,fontSize:13,color:"#a5b4fc",cursor:"pointer",marginTop:4,border:"1px solid #334155",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          🤖 有問題想問教練？
        </button>

        <button onClick={()=>{
          if(logForm.sets.filter(s=>s.kg).length===0 && logForm.parts.length===0) return;
          const t=new Date();
          setLogs(l=>[{
            date:`${t.getMonth()+1}/${t.getDate()}`,
            bodyTag,
            waist:logForm.waist?Number(logForm.waist):undefined,
            parts:[...selParts],
            sets:logForm.sets.filter(s=>s.ex),
            note:logForm.note
          },...l]);
          setLogForm({parts:[],bodyTag:"normal",waist:"",note:"",sets:[]});
          setImportedPlan(null);
          alert("✅ 已儲存！去「我的紀錄」查看");
        }}
          style={{width:"100%",padding:13,background:"#db2777",borderRadius:14,fontWeight:700,fontSize:14,color:"white",cursor:"pointer",marginTop:4,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          💾 儲存今天的訓練
        </button>
      </>)}

      {selParts.length===0&&(
        <div style={{textAlign:"center",padding:"32px 0",color:"#374151"}}>

      </div>

      {/* 訓練記錄列表 */}
      <div style={{fontWeight:700,fontSize:13,color:"#9ca3af"}}>訓練歷史
        {(logFilterPart!=="全部"||logFilterEx)&&(
          <span style={{marginLeft:8,fontSize:11,color:"#f472b6",fontWeight:400}}>
            （已篩選）
          </span>
        )}
      </div>

      {(()=>{
        // 篩選邏輯
        const filtered = logs.filter(log=>{
          // 部位篩選
          const partOk = logFilterPart==="全部" || (log.parts&&log.parts.includes(logFilterPart));
          // 動作篩選
          const exOk = !logFilterEx || (log.sets&&log.sets.some(s=>s.ex.includes(logFilterEx)));
          return partOk && exOk;
        });

        if(filtered.length===0){
          return(
            <div style={{textAlign:"center",padding:"24px 0",color:"#374151"}}>
              <div style={{fontSize:32,marginBottom:8}}>🔍</div>
              <div style={{fontSize:13}}>沒有符合條件的紀錄</div>
              <div style={{fontSize:11,marginTop:4,color:"#4b5563"}}>試試調整篩選條件</div>
            </div>
          );
        }

        return filtered.map((log,i)=>{
          const td=BODY_TAGS.find(t=>t.id===log.bodyTag);
          // 找出每個set對應的tip
          const getExTip=(exName)=>{
            const allExList = Object.values(db).flat();
            const found = allExList.find(e=>e.name===exName);
            return found?.tip||"";
          };
          const getExCoach=(exName)=>{
            const allExList = Object.values(db).flat();
            const found = allExList.find(e=>e.name===exName);
            return found?.coach||"";
          };

          return(
          <div key={i} style={{background:"#111827",borderRadius:14,padding:12,border:"1px solid #1e293b"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div>
                <span style={{fontWeight:700,fontSize:13}}>{log.date}</span>
                {log.parts&&log.parts.map(p=>(
                  <span key={p} style={{fontSize:9,padding:"1px 6px",borderRadius:99,background:(PC[p]||"#db2777")+"33",
                    color:PC[p]||"#db2777",marginLeft:5}}>
                    {PI[p]} {p}
                  </span>
                ))}
              </div>
              <span style={{fontSize:12}}>{td?.icon} {td?.label}</span>
            </div>

            {log.sets&&log.sets.length>0&&(
              <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:8}}>
                {log.sets.map((s,j)=>{
                  const tipKey=`${i}-${j}`;
                  const isOpen=expandedTip===tipKey;
                  const tip=getExTip(s.ex);
                  const coach=getExCoach(s.ex);
                  return(
                  <div key={j}>
                    <div onClick={()=>setExpandedTip(isOpen?null:tipKey)}
                      style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                        fontSize:11,padding:"6px 10px",borderRadius:9,
                        background:isOpen?"#1e3a5f":"#1e293b",
                        border:`1px solid ${isOpen?"#3b82f6":"transparent"}`,
                        cursor:tip?"pointer":"default"}}>
                      <span>
                        <span style={{color:"#d1d5db",fontWeight:600}}>{s.ex}</span>
                        <span style={{color:"#f472b6",marginLeft:8}}>{s.kg}kg × {s.reps}下 × {s.sets}組</span>
                      </span>
                      {tip&&<span style={{fontSize:13,color:"#3b82f6"}}>{isOpen?"▲":"💡"}</span>}
                    </div>
                    {isOpen&&(tip||coach)&&(
                      <div style={{padding:"8px 10px",background:"#0f172a",borderRadius:"0 0 9px 9px",
                        border:"1px solid #3b82f644",borderTop:"none"}}>
                        {tip&&(
                          <div style={{marginBottom:coach?6:0}}>
                            <span style={{fontSize:9,color:"#3b82f6",fontWeight:700}}>💡 動作要點　</span>
                            <span style={{fontSize:11,color:"#93c5fd",lineHeight:1.6}}>{tip}</span>
                          </div>
                        )}
                        {coach&&(
                          <div>
                            <span style={{fontSize:9,color:"#f472b6",fontWeight:700}}>👨‍🏫 教練說　</span>
                            <span style={{fontSize:11,color:"#fda4af",lineHeight:1.6}}>{coach}</span>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                  );
                })}
              </div>
            )}

            {log.waist&&<div style={{fontSize:10,color:"#f472b6",marginBottom:4}}>腰圍：{log.waist} cm</div>}
            {log.note&&<div style={{fontSize:10,color:"#6b7280",marginTop:4,padding:"5px 8px",background:"#0f172a",borderRadius:7}}>{log.note}</div>}
          </div>
          );
        });
      })()}
    </div>)}

    {/* ════ 數據分析 ════ */}
    {tab==="stats"&&(()=>{
      const [statEx, setStatEx] = React.useState("");

      // 收集所有出現過的動作名稱
      const allExNames = [...new Set(logs.flatMap(l=>l.sets||[]).map(s=>s.ex))].filter(Boolean).sort();

      // 🏆 個人最大重量紀錄
      const prMap = {};
      logs.forEach(l=>{
        (l.sets||[]).forEach(s=>{
          const kg = Number(s.kg)||0;
          if(!prMap[s.ex] || kg > prMap[s.ex].kg){
            prMap[s.ex] = {kg, date:l.date, equip:s.equip||""};
          }
        });
      });
      const prList = Object.entries(prMap)
        .map(([name,v])=>({name,...v}))
        .filter(r=>r.kg>0)
        .sort((a,b)=>b.kg-a.kg);

      // 📈 選定動作的重量進步資料
      const progressData = (()=>{
        if(!statEx) return [];
        const pts = [];
        [...logs].reverse().forEach(l=>{
          const s = (l.sets||[]).find(s=>s.ex===statEx);
          if(s && Number(s.kg)>0) pts.push({date:l.date, kg:Number(s.kg), equip:s.equip||""});
        });
        return pts;
      })();

      // 📊 訓練頻率：每筆紀錄的部位統計
      const partCount = {};
      logs.forEach(l=>{
        (l.parts||[]).forEach(p=>{ partCount[p]=(partCount[p]||0)+1; });
      });
      const partEntries = Object.entries(partCount).sort((a,b)=>b[1]-a[1]);
      const maxPartCount = partEntries.length>0 ? partEntries[0][1] : 1;

      // 🗓 每週訓練次數（最近8週）
      const weeklyMap = {};
      logs.forEach(l=>{
        const key = l.date||"";
        const parts = key.split("/");
        if(parts.length===2){
          const m=Number(parts[0]), d=Number(parts[1]);
          const weekKey = `${m}/${Math.ceil(d/7)}週`;
          weeklyMap[weekKey] = (weeklyMap[weekKey]||0)+1;
        }
      });
      const weeklyData = Object.entries(weeklyMap).slice(-8);
      const maxWeekly = weeklyData.length>0 ? Math.max(...weeklyData.map(w=>w[1])) : 1;

      // SVG 折線圖（重量進步）
      const LineChart = ({data})=>{
        if(data.length < 2) return (
          <div style={{textAlign:"center",padding:"24px 0",color:"#4b5563",fontSize:12}}>
            {data.length===1 ? `只有一筆紀錄（${data[0].date} ${data[0].kg}kg），繼續訓練累積更多！` : "還沒有這個動作的紀錄"}
          </div>
        );
        const W=280, H=100, pad=30;
        const kgs = data.map(d=>d.kg);
        const minK = Math.min(...kgs), maxK = Math.max(...kgs);
        const rng = maxK-minK || 1;
        const pts = data.map((d,i)=>({
          x: pad + (i/(data.length-1))*(W-pad*2),
          y: H - pad - ((d.kg-minK)/rng)*(H-pad*2),
          ...d
        }));
        const pathD = pts.map((p,i)=>`${i===0?"M":"L"}${p.x},${p.y}`).join(" ");
        const areaD = `${pathD} L${pts[pts.length-1].x},${H-pad} L${pts[0].x},${H-pad} Z`;
        return (
          <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:100}}>
            <defs>
              <linearGradient id="lg1" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#f472b6" stopOpacity="0.3"/>
                <stop offset="100%" stopColor="#f472b6" stopOpacity="0"/>
              </linearGradient>
            </defs>
            {/* 背景格線 */}
            {[0,0.5,1].map((f,i)=>(
              <line key={i} x1={pad} y1={pad+(H-pad*2)*f} x2={W-pad} y2={pad+(H-pad*2)*f}
                stroke="#1e293b" strokeWidth="1"/>
            ))}
            {/* Y 軸標籤 */}
            <text x={pad-4} y={pad+4} fill="#6b7280" fontSize="8" textAnchor="end">{maxK}kg</text>
            <text x={pad-4} y={H-pad+4} fill="#6b7280" fontSize="8" textAnchor="end">{minK}kg</text>
            {/* 填色面積 */}
            <path d={areaD} fill="url(#lg1)"/>
            {/* 折線 */}
            <path d={pathD} fill="none" stroke="#f472b6" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            {/* 數據點 */}
            {pts.map((p,i)=>(
              <g key={i}>
                <circle cx={p.x} cy={p.y} r="4" fill="#f472b6" stroke="#0f172a" strokeWidth="1.5"/>
                <text x={p.x} y={p.y-8} fill="#f9fafb" fontSize="8" textAnchor="middle">{p.kg}kg</text>
                <text x={p.x} y={H-pad+12} fill="#6b7280" fontSize="7" textAnchor="middle">{p.date}</text>
              </g>
            ))}
          </svg>
        );
      };

      // 計算進步百分比
      const improvement = progressData.length>=2
        ? (((progressData[progressData.length-1].kg - progressData[0].kg) / progressData[0].kg)*100).toFixed(1)
        : null;

      return (
      <div className="slide-in" style={{display:"flex",flexDirection:"column",gap:14}}>

        {/* 總覽卡片 */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[
            {label:"訓練次數",value:logs.length+"次",icon:"🗓",color:"#a78bfa"},
            {label:"動作種類",value:allExNames.length+"種",icon:"💪",color:"#34d399"},
            {label:"個人PR",value:prList.length+"項",icon:"🏆",color:"#fbbf24"},
          ].map((c,i)=>(
            <div key={i} style={{background:"#111827",borderRadius:12,padding:"10px 8px",
              border:`1px solid ${c.color}44`,textAlign:"center"}}>
              <div style={{fontSize:20,marginBottom:2}}>{c.icon}</div>
              <div style={{fontSize:18,fontWeight:700,color:c.color}}>{c.value}</div>
              <div style={{fontSize:9,color:"#6b7280",marginTop:1}}>{c.label}</div>
            </div>
          ))}
        </div>

        {/* 📈 重量進步圖 */}
        <div style={{background:"#111827",borderRadius:14,padding:14,border:"1px solid #1e293b"}}>
          <div style={{fontWeight:700,fontSize:13,color:"#f472b6",marginBottom:8}}>📈 重量進步趨勢</div>
          <select value={statEx} onChange={e=>setStatEx(e.target.value)}
            style={{width:"100%",background:"#1e293b",border:"1px solid #334155",borderRadius:8,
              padding:"8px 10px",fontSize:12,color:"white",marginBottom:10}}>
            <option value="">— 選一個動作 —</option>
            {allExNames.map(n=><option key={n} value={n}>{n}</option>)}
          </select>
          {statEx && improvement!==null && (
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <div style={{flex:1,background:"#0f172a",borderRadius:8,padding:"6px 10px",textAlign:"center"}}>
                <div style={{fontSize:9,color:"#6b7280"}}>起始</div>
                <div style={{fontSize:14,fontWeight:700,color:"#f9fafb"}}>{progressData[0].kg}kg</div>
              </div>
              <div style={{display:"flex",alignItems:"center",fontSize:18}}>
                {Number(improvement)>=0?"📈":"📉"}
              </div>
              <div style={{flex:1,background:"#0f172a",borderRadius:8,padding:"6px 10px",textAlign:"center"}}>
                <div style={{fontSize:9,color:"#6b7280"}}>最近</div>
                <div style={{fontSize:14,fontWeight:700,color:"#f9fafb"}}>{progressData[progressData.length-1].kg}kg</div>
              </div>
              <div style={{flex:1,background:Number(improvement)>=0?"#0a2718":"#2d1515",borderRadius:8,padding:"6px 10px",textAlign:"center",border:`1px solid ${Number(improvement)>=0?"#166534":"#7f1d1d"}`}}>
                <div style={{fontSize:9,color:"#6b7280"}}>進步</div>
                <div style={{fontSize:14,fontWeight:700,color:Number(improvement)>=0?"#4ade80":"#f87171"}}>
                  {Number(improvement)>=0?"+":""}{improvement}%
                </div>
              </div>
            </div>
          )}
          <LineChart data={progressData}/>
        </div>

        {/* 🗓 訓練部位頻率 */}
        <div style={{background:"#111827",borderRadius:14,padding:14,border:"1px solid #1e293b"}}>
          <div style={{fontWeight:700,fontSize:13,color:"#a78bfa",marginBottom:10}}>🗓 各部位訓練次數</div>
          {partEntries.length===0
            ? <div style={{textAlign:"center",color:"#4b5563",fontSize:12,padding:"16px 0"}}>還沒有訓練紀錄</div>
            : partEntries.map(([part,cnt])=>(
              <div key={part} style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{fontSize:11,color:"#d1d5db"}}>{PI[part]} {part}</span>
                  <span style={{fontSize:11,color:PC[part]||"#a78bfa",fontWeight:700}}>{cnt}次</span>
                </div>
                <div style={{height:6,background:"#1e293b",borderRadius:99,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${(cnt/maxPartCount)*100}%`,
                    background:PC[part]||"#a78bfa",borderRadius:99,transition:"width 0.4s"}}/>
                </div>
              </div>
            ))
          }
        </div>

        {/* 🗓 每週訓練次數 */}
        {weeklyData.length>0&&(
        <div style={{background:"#111827",borderRadius:14,padding:14,border:"1px solid #1e293b"}}>
          <div style={{fontWeight:700,fontSize:13,color:"#38bdf8",marginBottom:10}}>📅 近期訓練頻率</div>
          <div style={{display:"flex",alignItems:"flex-end",gap:6,height:60}}>
            {weeklyData.map(([week,cnt],i)=>(
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                <span style={{fontSize:9,color:"#38bdf8",fontWeight:700}}>{cnt}</span>
                <div style={{width:"100%",background:"#38bdf8",borderRadius:"4px 4px 0 0",
                  height:`${(cnt/maxWeekly)*48}px`,minHeight:4}}/>
                <span style={{fontSize:7,color:"#6b7280",textAlign:"center",lineHeight:1.2}}>{week}</span>
              </div>
            ))}
          </div>
        </div>)}

        {/* 🏆 個人PR排行 */}
        <div style={{background:"#111827",borderRadius:14,padding:14,border:"1px solid #fbbf2444"}}>
          <div style={{fontWeight:700,fontSize:13,color:"#fbbf24",marginBottom:10}}>🏆 個人最大重量紀錄</div>
          {prList.length===0
            ? <div style={{textAlign:"center",color:"#4b5563",fontSize:12,padding:"16px 0"}}>開始訓練後會出現這裡 💪</div>
            : prList.slice(0,10).map((r,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",
                borderBottom:i<prList.slice(0,10).length-1?"1px solid #1e293b":"none"}}>
                <span style={{fontSize:14,width:20,textAlign:"center",flexShrink:0}}>
                  {i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}.`}
                </span>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:600,color:"#f9fafb"}}>{r.name}</div>
                  {r.equip&&<div style={{fontSize:9,color:"#6b7280",marginTop:1}}>🔧 {r.equip}</div>}
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:15,fontWeight:700,color:"#fbbf24"}}>{r.kg}kg</div>
                  <div style={{fontSize:9,color:"#6b7280"}}>{r.date}</div>
                </div>
              </div>
            ))
          }
        </div>

      </div>
      );
    })()}

    </div>
  </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
